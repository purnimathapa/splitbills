{% extends "base.html" %}

{% block content %}

<div class="auth-wrapper">

    <div class="glass-card">

        <h2>

            Create Account 🚀

        </h2>

        <form method="POST">

            <input
                    type="text"
                    name="name"
                    placeholder="Full Name"
                    required>

            <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    required>

            <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required>

            <button class="btn-primary">

                Register

            </button>

        </form>

    </div>

</div>

{% endblock %}
