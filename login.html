{% extends "base.html" %}

{% block content %}

<div class="auth-wrapper">

    <div class="glass-card">

        <h2>
            Welcome Back 👋
        </h2>

        <form method="POST">

            <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    required>

            <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required>

            <button class="btn-primary">

                Login

            </button>

        </form>

        <p>

            Don't have an account?

            <a href="/register">

                Register

            </a>

        </p>

    </div>

</div>

{% endblock %}
